<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sushant Sonawane</title>
    <link rel="stylesheet" href="./Styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="main-continer">
      <header>
        <i class="fa-solid fa-bars bars"></i>
        <nav>
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="#se2">Skills</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
      </header>
      <!-- section for home page -->
      <section class="first-section">
        <div class="container">
          <div class="left"></div>
          <div class="right">
            <div class="right-titles">
              <h1>Sushant Sonawane</h1>
              <h3>A Passionate <span class="titles"> Web Developer</span></h3>
            </div>
            <div class="right-btns">
              <button>Contact</button>
              <button>Download CV</button>
            </div>
          </div>
        </div>
      </section>
      <!-- skill section strat -->
      <section class="skills">
        <div class="skills-wrapper">
          <h3 id="se2" class="titles">What I Know</h3>
          <div class="skills-container">
            <div class="card front">
              <h3 class="titles">Front End</h3>
              <div class="card-container">
                <div>HTML</div>
                <div>CSS</div>
                <div>Javascript</div>
                <div>React JS</div>
              </div>
            </div>

            <div class="card end">
              <h3 class="titles">Backend</h3>
              <div class="card-container">
                <div>NodeJS</div>
                <div>ExpressJS</div>
              </div>
            </div>

            <div class="card database">
              <h3 class="titles">Database</h3>
              <div class="card-container">
                <div>MongoDB</div>
                <div>MySql</div>
              </div>
            </div>

            <div class="card other">
              <h3 class="titles">Other</h3>
              <div class="card-container">
                <div>Rest API's</div>
                <div>Teliwind CSS</div>
                <div>SEO</div>
                <div>GitHub</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
